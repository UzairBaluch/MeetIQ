services:
  postgres:
    image: postgres:16
    container_name: meetiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meetiq
    ports:
      - "5432:5432"
    volumes:
      - meetiq_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meetiq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  meetiq_postgres_data:
